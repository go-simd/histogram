name: bench
on:
  push: { branches: [main, bench] }
  workflow_dispatch:
jobs:
  bench:
    runs-on: ubuntu-latest # native amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: stable }
      - run: go test -run '^$' -bench 'Count|Single|Multi' -benchmem -count=6 ./...
